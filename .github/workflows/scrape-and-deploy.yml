name: Scrape & Deploy

on:
  schedule:
    - cron: "0 8 * * 1-5" # Weekdays 08:00 UTC
  workflow_dispatch:
    inputs:
      site:
        description: "Scrape a single restaurant (key from restaurants.json). Leave empty to scrape all."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Read restaurants.json and output the matrix for the scrape jobs.
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from restaurants.json
        id: set-matrix
        run: |
          site="${{ inputs.site }}"
          if [ -n "$site" ]; then
            matrix=$(jq -c --arg key "$site" '[.[] | select(.key == $key)]' restaurants.json)
            if [ "$matrix" = "[]" ]; then
              echo "::error::Unknown site '$site'. Check restaurants.json for valid keys."
              exit 1
            fi
          else
            matrix=$(jq -c '.' restaurants.json)
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 2. Scrape each restaurant in parallel (one job per restaurant).
  # ---------------------------------------------------------------------------
  scrape:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        restaurant: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install extra apt packages
        if: join(matrix.restaurant.apt_packages, ' ') != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ join(matrix.restaurant.apt_packages, ' ') }}

      - name: Scrape ${{ matrix.restaurant.name }}
        run: |
          tags="${{ matrix.restaurant.build_tags }}"
          if [ -n "$tags" ]; then
            go run -tags "$tags" ./cmd/scraper --site ${{ matrix.restaurant.key }}
          else
            go run ./cmd/scraper --site ${{ matrix.restaurant.key }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.restaurant.key }}
          path: web/public/data/${{ matrix.restaurant.key }}.json
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Merge all per-site JSONs and deploy to GitHub Pages.
  # ---------------------------------------------------------------------------
  deploy:
    needs: scrape
    if: always() && needs.scrape.result != 'cancelled'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Download all scrape artifacts
        uses: actions/download-artifact@v4
        with:
          path: web/public/data/
          merge-multiple: true

      - name: List downloaded data
        run: ls -la web/public/data/

      - name: Merge restaurant data
        run: go run ./cmd/scraper --merge --config restaurants.json

      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
