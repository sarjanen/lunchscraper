name: "Scrape: Don Luigi"

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-swe libtesseract-dev

      - name: Scrape Don Luigi
        run: go run ./cmd/scraper --site don_luigi

      - uses: actions/upload-artifact@v4
        with:
          name: don_luigi
          path: web/public/data/don_luigi.json
          retention-days: 1
