name: Scrape & Deploy

on:
  schedule:
    - cron: '0 8 * * 1-5' # Weekdays 08:00 UTC (~09:00 CET)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      # Install Tesseract OCR + Swedish language data (needed for Don Luigi image menu)
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-swe libtesseract-dev

      # Run the Go scraper — writes web/public/data/lunches.json
      - run: go run ./cmd/scraper

      # Build the Vite site
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
