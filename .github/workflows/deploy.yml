name: Deploy

on:
  schedule:
    - cron: "30 8 * * 1-5" # Weekdays 08:30 UTC — after all scrapers finish
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      # Download per-site scrape results from their workflow runs.
      # if_no_artifact_found: warn — a failed/missing scraper won't block deploy.
      - name: Download Don Luigi
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scrape-donluigi.yml
          workflow_conclusion: success
          name: don_luigi
          path: web/public/data/
          if_no_artifact_found: warn

      - name: Download La Luna
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scrape-laluna.yml
          workflow_conclusion: success
          name: la_luna
          path: web/public/data/
          if_no_artifact_found: warn

      - name: Download Laszlo Ebbepark
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scrape-laszlo.yml
          workflow_conclusion: success
          name: laszlo_ebbepark
          path: web/public/data/
          if_no_artifact_found: warn

      - name: Download Monte Carlo
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scrape-montecarlo.yml
          workflow_conclusion: success
          name: monte_carlo
          path: web/public/data/
          if_no_artifact_found: warn

      - name: Download Wardshuset
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: scrape-wardshuset.yml
          workflow_conclusion: success
          name: wardshuset
          path: web/public/data/
          if_no_artifact_found: warn

      - name: List downloaded data
        run: ls -la web/public/data/

      # Merge per-site JSONs into lunches.json
      - name: Merge restaurant data
        run: go run ./cmd/scraper --merge

      # Build the Vite site
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
