<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunch i Linköping</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e4e4e4;
      --text-dim: #888;
      --accent: #f0a500;
      --accent-dim: #b07800;
      --today: #1e3a1e;
      --today-border: #3a6b3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 1rem;
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 1.5rem 0 1rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header .meta {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }

    .day-nav {
      display: flex;
      gap: 0.25rem;
      overflow-x: auto;
      padding: 0.5rem 0 1rem;
      -webkit-overflow-scrolling: touch;
    }

    .day-nav button {
      flex-shrink: 0;
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .day-nav button:hover { background: var(--surface2); }

    .day-nav button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    .restaurant {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .restaurant-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .restaurant-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .restaurant-location {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .menu-tag {
      font-size: 0.7rem;
      color: var(--accent);
      background: rgba(240, 165, 0, 0.1);
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .menu-items { padding: 0.25rem 0; }

    .menu-item {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .menu-item:last-child { border-bottom: none; }

    .dish-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .dish-desc {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 0.1rem;
    }

    .day-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-dim);
      padding: 0.5rem 1rem 0.1rem;
    }

    .empty {
      color: var(--text-dim);
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
    }

    .source-link {
      display: block;
      text-align: right;
      padding: 0.4rem 1rem 0.5rem;
      font-size: 0.75rem;
    }

    .source-link a {
      color: var(--text-dim);
      text-decoration: none;
    }

    .source-link a:hover { text-decoration: underline; }

    .menu-image {
      padding: 0.5rem 1rem 0.75rem;
      text-align: center;
    }

    .menu-image img {
      max-width: 100%;
      border-radius: 0.5rem;
    }

    @media (min-width: 480px) {
      body { padding: 1.5rem; }
      header h1 { font-size: 1.75rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🍽 Lunch i Linköping</h1>
    <div class="meta" id="meta"></div>
  </header>
  <nav class="day-nav" id="dayNav"></nav>
  <main id="content"></main>

  <script>
    const DAYS_SV = {
      0: 'Måndag', 1: 'Tisdag', 2: 'Onsdag', 3: 'Torsdag', 4: 'Fredag', 5: 'Lördag', 6: 'Söndag'
    };

    const SHORT_DAYS = {
      0: 'Mån', 1: 'Tis', 2: 'Ons', 3: 'Tor', 4: 'Fre', 5: 'Lör', 6: 'Sön'
    };

    const MONTHS_SV = [
      'jan', 'feb', 'mar', 'apr', 'maj', 'jun',
      'jul', 'aug', 'sep', 'okt', 'nov', 'dec'
    ];

    function parseDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDate(iso) {
      const d = parseDate(iso);
      return `${d.getDate()} ${MONTHS_SV[d.getMonth()]}`;
    }

    function dayName(iso) {
      const d = parseDate(iso);
      const dow = d.getDay(); // 0=Sun
      return DAYS_SV[dow === 0 ? 6 : dow - 1];
    }

    function shortDay(iso) {
      const d = parseDate(iso);
      const dow = d.getDay();
      return SHORT_DAYS[dow === 0 ? 6 : dow - 1];
    }

    function isoStr(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getWeekDates(data) {
      const dates = new Set();
      data.restaurants.forEach(r => r.items.forEach(i => dates.add(i.date)));
      return [...dates].sort();
    }

    function todayISO() {
      return isoStr(new Date());
    }

    let selectedDate = null;
    let data = null;

    async function init() {
      const res = await fetch('data/lunches.json');
      data = await res.json();

      const genDate = new Date(data.generated_at);
      document.getElementById('meta').textContent =
        `Uppdaterad ${genDate.getDate()} ${MONTHS_SV[genDate.getMonth()]} kl ${String(genDate.getHours()).padStart(2, '0')}:${String(genDate.getMinutes()).padStart(2, '0')}`;

      const dates = getWeekDates(data);
      const today = todayISO();
      selectedDate = dates.includes(today) ? today : dates[0];

      renderNav(dates);
      render();
    }

    function renderNav(dates) {
      const nav = document.getElementById('dayNav');
      nav.innerHTML = dates.map(d => {
        const today = todayISO();
        const label = `${shortDay(d)} ${formatDate(d)}`;
        const isToday = d === today;
        return `<button data-date="${d}" class="${d === selectedDate ? 'active' : ''}">${label}${isToday ? ' ●' : ''}</button>`;
      }).join('');

      nav.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedDate = btn.dataset.date;
          renderNav(dates);
          render();
        });
      });
    }

    function render() {
      const main = document.getElementById('content');
      if (!data) return;

      const html = data.restaurants.map(r => {
        const isImage = r.menu_type === 'image';
        const isWeekly = r.menu_type === 'weekly';
        const items = (r.items || []);
        const filteredItems = isWeekly ? items : items.filter(i => i.date === selectedDate);

        let itemsHTML = '';
        if (isImage && r.image_url) {
          itemsHTML = `<div class="menu-image"><img src="${esc(r.image_url)}" alt="Lunchmeny ${esc(r.restaurant)}" loading="lazy"></div>`;
        } else if (filteredItems.length === 0) {
          itemsHTML = `<div class="empty">Ingen lunch denna dag</div>`;
        } else if (isWeekly) {
          itemsHTML = `<div class="menu-items">${filteredItems.map(i =>
            `<div class="menu-item">
              <div class="dish-name">${esc(i.name)}</div>
              ${i.description ? `<div class="dish-desc">${esc(i.description)}</div>` : ''}
            </div>`
          ).join('')}</div>`;
        } else {
          // Daily — group by date for the selected day (usually just one date)
          const grouped = {};
          filteredItems.forEach(i => {
            if (!grouped[i.date]) grouped[i.date] = [];
            grouped[i.date].push(i);
          });

          itemsHTML = Object.entries(grouped).map(([date, dishes]) =>
            `<div class="menu-items">${dishes.map(i =>
              `<div class="menu-item">
                <div class="dish-name">${esc(i.name)}</div>
                ${i.description ? `<div class="dish-desc">${esc(i.description)}</div>` : ''}
              </div>`
            ).join('')}</div>`
          ).join('');
        }

        const tagLabel = isImage ? 'Bildmeny' : isWeekly ? 'Veckans meny' : 'Dagens lunch';

        return `<section class="restaurant">
          <div class="restaurant-header">
            <div>
              <span class="restaurant-name">${esc(r.restaurant)}</span>
              <span class="restaurant-location"> · ${esc(r.location)}</span>
            </div>
            <span class="menu-tag">${tagLabel}</span>
          </div>
          ${itemsHTML}
          <div class="source-link"><a href="${esc(r.source)}" target="_blank" rel="noopener">Källa ↗</a></div>
        </section>`;
      }).join('');

      main.innerHTML = html;
    }

    function esc(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    init();
  </script>
</body>
</html>
